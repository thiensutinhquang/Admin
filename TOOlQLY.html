<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event CRM Enterprise | Minh Sư Tịnh Quang</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ================= HỆ THỐNG GIAO DIỆN (UI/UX) ================= */
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        
        /* Custom Scrollbar mượt mà */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Hiệu ứng Kính (Glassmorphism) */
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }

        /* Form Inputs */
        .form-control {
            background-color: #1e293b; border: 1px solid #334155; color: #f8fafc;
            border-radius: 0.5rem; padding: 0.6rem 1rem; width: 100%; transition: all 0.2s; outline: none; font-size: 0.875rem;
        }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); }

        /* Buttons Đa Năng */
        .btn { padding: 0.6rem 1rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; cursor: pointer; border: none; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8, #1e3a8a); }
        .btn-secondary { background-color: #334155; color: white; border: 1px solid #475569; }
        .btn-secondary:hover { background-color: #475569; }
        .btn-danger { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background-color: #ef4444; color: white; }
        .btn-ai { background: linear-gradient(135deg, #9333ea, #db2777); color: white; box-shadow: 0 4px 14px 0 rgba(219, 39, 119, 0.3); }
        .btn-ai:hover { background: linear-gradient(135deg, #7e22ce, #be185d); }

        /* Bảng Dữ Liệu (Spreadsheet) */
        .sheet-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .sheet-table th { background: #1e293b; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; padding: 12px 16px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #3b82f6; text-align: left; }
        .sheet-table td { border-bottom: 1px solid #1e293b; padding: 12px 16px; font-size: 0.875rem; background: #0f172a; transition: background 0.2s; white-space: pre-wrap; vertical-align: top;}
        .sheet-table tr:hover td { background-color: #1e293b; }
        
        /* Chỉnh sửa trực tiếp (Notion Style) */
        .editable-cell { cursor: text; transition: all 0.2s ease; outline: none; min-width: 80px; }
        .editable-cell:focus { background: #1e1b4b !important; outline: 2px solid #818cf8; outline-offset: -2px; border-radius: 4px; color: white; }

        /* Tối ưu SweetAlert2 cho Dark Mode */
        .swal2-popup { background: #1e293b !important; color: #f8fafc !important; border-radius: 1rem !important; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;}
        .swal2-title { color: #f8fafc !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
        .swal2-input, .swal2-textarea, .swal2-select { background: #0f172a !important; color: #fff !important; border: 1px solid #334155 !important; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/90 z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
        <div class="text-blue-400 text-sm tracking-widest font-medium animate-pulse uppercase">Đang khởi tạo hệ thống...</div>
    </div>

    <header class="glass-panel mx-4 mt-4 px-6 py-4 flex flex-col xl:flex-row items-center justify-between gap-4 z-40 shrink-0 rounded-2xl">
        <div class="flex items-center gap-4 w-full xl:w-auto justify-center xl:justify-start">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg text-white shrink-0">
                <i class="fa-solid fa-calendar-check text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white leading-none">Event CRM <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded-md uppercase ml-1 align-top">Enterprise</span></h1>
                <p class="text-[11px] text-slate-400 font-semibold tracking-widest uppercase mt-1">Minh Sư Tịnh Quang</p>
            </div>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 bg-slate-800/50 p-1.5 rounded-xl border border-slate-700 w-full xl:w-auto">
            <select id="eventSelector" class="form-control border-none bg-transparent font-semibold text-white focus:box-shadow-none cursor-pointer min-w-[250px]"></select>
            <button onclick="App.db.createEvent()" class="btn btn-primary px-3" title="Tạo sự kiện mới"><i class="fa-solid fa-plus"></i></button>
            <button onclick="App.ui.renameEvent()" class="btn btn-secondary px-3" title="Đổi tên sự kiện"><i class="fa-solid fa-pen"></i></button>
            <button onclick="App.ui.shareEvent()" class="btn btn-secondary px-3" title="Sao chép Link chia sẻ"><i class="fa-solid fa-share-nodes"></i></button>
            <button onclick="App.db.deleteEvent()" class="btn btn-danger px-3 hover:bg-red-500" title="Xóa sự kiện"><i class="fa-solid fa-trash"></i></button>
        </div>

        <div class="flex gap-2 w-full xl:w-auto justify-center">
            <button onclick="App.export.showOptions()" class="btn bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-900/50"><i class="fa-solid fa-print"></i> Xuất Báo Cáo</button>
            <button onclick="App.ai.openAssistant()" class="btn btn-ai shadow-lg shadow-purple-900/50"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Copilot</button>
            <button onclick="App.ai.configKey()" class="btn btn-secondary text-amber-400 border-amber-500/30 hover:bg-amber-500/20" title="Cài đặt API Key AI"><i class="fa-solid fa-key"></i></button>
        </div>
    </header>

    <main class="flex-1 p-4 grid grid-cols-1 xl:grid-cols-4 gap-6 max-w-[1920px] w-full mx-auto overflow-hidden">
        
        <aside class="xl:col-span-1 flex flex-col gap-6 overflow-y-auto hide-scrollbar pb-6">
            
            <div class="glass-panel p-5 rounded-2xl shrink-0 border-t-4 border-t-blue-500">
                <h3 class="text-sm font-bold text-blue-400 uppercase tracking-wider mb-4 pb-3 border-b border-slate-700/50 flex items-center">
                    <i class="fa-solid fa-keyboard mr-2"></i> Bảng Nhập Liệu
                </h3>
                <select id="formSectionSelect" class="form-control text-sm mb-4 font-semibold text-blue-300 bg-blue-900/20 border-blue-800" onchange="App.ui.renderForm()"></select>
                <form id="regForm" class="space-y-4"></form>
                <button type="button" onclick="App.ui.saveForm()" class="btn btn-primary w-full mt-5 py-3 shadow-lg shadow-blue-900/50"><i class="fa-solid fa-check-double"></i> Lưu vào Bảng</button>
            </div>

            <div class="glass-panel p-5 rounded-2xl flex flex-col h-[350px] shrink-0 border-t-4 border-t-emerald-500">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider"><i class="fa-solid fa-chart-pie mr-2"></i> Phân tích</h3>
                    <select id="chartColSelect" class="form-control py-1 px-2 w-32 text-xs bg-slate-900 border-slate-700" onchange="App.chart.update()"></select>
                </div>
                <div class="flex-1 relative w-full h-full flex items-center justify-center">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>
        </aside>

        <section class="xl:col-span-3 glass-panel p-5 rounded-2xl flex flex-col overflow-hidden">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4 shrink-0">
                <h2 class="text-lg font-bold text-white"><i class="fa-solid fa-database mr-2 text-blue-500"></i> Cơ sở Dữ liệu Thời gian thực</h2>
                <button onclick="App.ui.manageSections()" class="btn btn-secondary text-sm border-dashed hover:border-solid"><i class="fa-solid fa-layer-group"></i> Quản lý Tab/Bảng</button>
            </div>
            
            <div id="sectionsContainer" class="space-y-8 flex-1 overflow-y-auto pr-2 pb-10 hide-scrollbar">
                </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Công cụ Thông báo
        const Toast = Swal.mixin({ toast: true, position: 'bottom-end', showConfirmButton: false, timer: 2500, timerProgressBar: true });

        // ========================================================
        // KIẾN TRÚC ENTERPRISE OOP (Mô hình Hướng Đối Tượng)
        // ========================================================
        window.App = {
            // 1. CẤU HÌNH MẶC ĐỊNH
            config: {
                firebase: {
                    apiKey: "AIzaSyBVAwc637Ql73tmvCe0VjXccg9Zg5KtT_g",
                    authDomain: "noidungdanang.firebaseapp.com",
                    projectId: "noidungdanang"
                },
                defaultCols: [
                    { id: 'col_name', label: "Họ Tên / Hạng mục" }, 
                    { id: 'col_unit', label: "Đơn vị / Phân loại" }, 
                    { id: 'col_notes', label: "Ghi chú" }
                ]
            },

            // 2. TRẠNG THÁI HỆ THỐNG
            state: {
                db: null, auth: null, user: null, events: [], currentEventId: null, currentEventData: null,
                activeSectionId: null, chartInstance: null, unsubEvent: null, unsubList: null
            },

            // 3. KHỞI TẠO ỨNG DỤNG
            async init() {
                try {
                    const app = initializeApp(this.config.firebase);
                    this.state.db = getFirestore(app);
                    this.state.auth = getAuth(app);

                    // Lắng nghe Đăng nhập Ẩn danh
                    onAuthStateChanged(this.state.auth, async (user) => {
                        if (user) {
                            this.state.user = user;
                            this.db.listenToEventList();
                        } else {
                            await signInAnonymously(this.state.auth);
                        }
                    });

                    // Xử lý Share Link (Routing)
                    window.addEventListener('hashchange', () => {
                        const hashId = window.location.hash.substring(1);
                        if (hashId && hashId !== this.state.currentEventId) this.db.loadEvent(hashId);
                    });

                    const secContainer = document.getElementById('sectionsContainer');

                    // EVENT: Nhấn Enter để Lưu khi Sửa trực tiếp trên Bảng (Chống rớt dòng)
                    secContainer.addEventListener('keydown', (e) => {
                        if (e.target.classList.contains('editable-cell') && e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault(); e.target.blur(); // Gọi onblur để lưu Firebase
                        }
                    });

                    // EVENT: Lọc định dạng rác (Clear Formatting) khi Copy Paste từ Word/Excel
                    secContainer.addEventListener('paste', (e) => {
                        if (e.target.classList.contains('editable-cell')) {
                            e.preventDefault();
                            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                            document.execCommand('insertText', false, text);
                        }
                    });
                } catch (error) {
                    Swal.fire('Lỗi Hệ Thống', 'Không thể kết nối Firebase. Kiểm tra mạng hoặc API Key.', 'error');
                }
            },

            // 4. QUẢN LÝ CƠ SỞ DỮ LIỆU (FIREBASE)
            db: {
                listenToEventList() {
                    const q = query(collection(App.state.db, "events"));
                    if(App.state.unsubList) App.state.unsubList();

                    App.state.unsubList = onSnapshot(q, (snapshot) => {
                        App.state.events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt);
                        const sel = document.getElementById('eventSelector');
                        
                        if (App.state.events.length === 0) {
                            sel.innerHTML = '<option value="">(Chưa có sự kiện nào)</option>';
                            document.getElementById('loading-overlay').classList.add('opacity-0', 'pointer-events-none');
                            return;
                        }

                        sel.innerHTML = App.state.events.map(e => `<option value="${e.id}">${e.name}</option>`).join('');

                        const hashId = window.location.hash.substring(1);
                        if (hashId && App.state.events.find(e => e.id === hashId)) {
                            sel.value = hashId;
                            if(App.state.currentEventId !== hashId) this.loadEvent(hashId);
                        } else if (!App.state.currentEventId) {
                            window.location.hash = App.state.events[0].id;
                        } else {
                            sel.value = App.state.currentEventId;
                        }
                    });

                    document.getElementById('eventSelector').addEventListener('change', (e) => window.location.hash = e.target.value);
                },

                loadEvent(eventId) {
                    if(App.state.unsubEvent) App.state.unsubEvent();
                    App.state.currentEventId = eventId;
                    document.getElementById('eventSelector').value = eventId;

                    App.state.unsubEvent = onSnapshot(doc(App.state.db, 'events', eventId), (docSnap) => {
                        document.getElementById('loading-overlay').classList.add('opacity-0', 'pointer-events-none');
                        
                        if (docSnap.exists()) {
                            let data = docSnap.data();
                            // Tự động Migration nếu Data cũ bị lỗi mảng
                            if (!data.sections) {
                                data.sections = [{ id: `sec_1`, title: "Bảng dữ liệu chính", columns: data.columns || App.config.defaultCols, registrations: data.registrations || [], isTransposed: false }];
                                this.saveEventState();
                            }
                            
                            App.state.currentEventData = data;
                            if(!App.state.activeSectionId || !data.sections.find(s => s.id === App.state.activeSectionId)) {
                                App.state.activeSectionId = data.sections[0].id;
                            }
                            App.ui.renderWorkspace();
                        } else {
                            window.location.hash = '';
                        }
                    });
                },

                async createEvent() {
                    const { value: name } = await Swal.fire({ title: 'Tạo Sự Kiện Mới', input: 'text', inputPlaceholder: 'Tên sự kiện (VD: Lễ Vu Lan 2026)', showCancelButton: true, background: '#1e293b', color: '#fff' });
                    if (!name) return;

                    const newEvent = {
                        name: name.trim(), createdAt: Date.now(), owner: App.state.user.uid,
                        sections: [{ id: `sec_${Date.now()}`, title: "Danh sách Tham dự", columns: App.config.defaultCols, registrations: [], isTransposed: false }]
                    };
                    const docRef = await addDoc(collection(App.state.db, "events"), newEvent);
                    window.location.hash = docRef.id;
                    Toast.fire({ icon: 'success', title: 'Đã tạo sự kiện mới' });
                },

                async saveEventState(showToast = false) {
                    if (!App.state.currentEventId) return;
                    await updateDoc(doc(App.state.db, 'events', App.state.currentEventId), {
                        name: App.state.currentEventData.name,
                        sections: App.state.currentEventData.sections
                    });
                    if(showToast) Toast.fire({ icon: 'success', title: 'Đã lưu hệ thống' });
                },

                async deleteEvent() {
                    if (!App.state.currentEventId) return;
                    const confirm = await Swal.fire({ title: 'Xóa vĩnh viễn?', text: `Sự kiện "${App.state.currentEventData.name}" sẽ bị xóa hoàn toàn.`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Đồng ý Xóa', background: '#1e293b', color: '#fff' });
                    if (confirm.isConfirmed) {
                        await deleteDoc(doc(App.state.db, 'events', App.state.currentEventId));
                        window.location.hash = '';
                        Toast.fire({ icon: 'success', title: 'Đã xóa sự kiện' });
                    }
                }
            },

            // 5. GIAO DIỆN NGƯỜI DÙNG (UI/UX)
            ui: {
                renderWorkspace() {
                    this.renderSections();
                    this.renderForm();
                    App.chart.setup();
                },

                renderSections() {
                    const data = App.state.currentEventData;
                    if (!data || !data.sections) return;

                    document.getElementById('sectionsContainer').innerHTML = data.sections.map(sec => {
                        const isTrans = sec.isTransposed;
                        let tableHtml = '';

                        if (isTrans) {
                            // Render Bảng Ngang (Horizontal)
                            tableHtml = `<thead><tr><th class="w-32 bg-slate-900 border-r border-slate-700 z-20" style="left:0">Hạng mục</th>${sec.registrations.map((r,i) => `<th class="text-center font-mono w-40 min-w-[150px]">${i+1}</th>`).join('')}</tr></thead><tbody>`;
                            sec.columns.forEach(col => {
                                tableHtml += `<tr><td class="font-bold bg-slate-800/80 text-blue-400 sticky left-0 z-10 border-r border-slate-700">${col.label}</td>`;
                                sec.registrations.forEach(reg => {
                                    tableHtml += `<td class="editable-cell" contenteditable="true" onblur="App.ui.saveInlineCell(this, '${sec.id}', '${reg.id}', '${col.id}')">${reg.values[col.id] || ''}</td>`;
                                });
                                tableHtml += `</tr>`;
                            });
                            tableHtml += `<tr><td class="font-bold bg-slate-800/80 text-rose-400 sticky left-0 z-10 border-r border-slate-700">Tác vụ</td>${sec.registrations.map(r => `<td class="text-center"><button onclick="App.ui.deleteRow('${sec.id}', '${r.id}')" class="btn btn-danger py-1 px-2 text-xs hover:bg-rose-600"><i class="fa-solid fa-trash"></i></button></td>`).join('')}</tr></tbody>`;
                        } else {
                            // Render Bảng Dọc chuẩn (Vertical)
                            tableHtml = `<thead><tr><th class="w-12 text-center">STT</th>${sec.columns.map(c => `<th class="min-w-[150px]">${c.label}</th>`).join('')}<th class="w-16 text-center"><i class="fa-solid fa-bolt"></i></th></tr></thead><tbody>`;
                            if (sec.registrations.length === 0) tableHtml += `<tr><td colspan="100%" class="text-center py-10 text-slate-500 italic">Bảng trống. Sử dụng form bên trái để thêm dữ liệu.</td></tr>`;
                            
                            sec.registrations.forEach((reg, i) => {
                                tableHtml += `<tr class="group">
                                    <td class="text-center text-slate-500 font-mono text-sm">${i + 1}</td>
                                    ${sec.columns.map(c => `<td class="editable-cell" contenteditable="true" title="Click để sửa, Enter để Lưu" onblur="App.ui.saveInlineCell(this, '${sec.id}', '${reg.id}', '${c.id}')">${reg.values[c.id] || ''}</td>`).join('')}
                                    <td class="text-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="App.ui.deleteRow('${sec.id}', '${reg.id}')" class="text-slate-500 hover:text-red-400 p-2" title="Xóa dòng"><i class="fa-solid fa-trash-can"></i></button>
                                    </td>
                                </tr>`;
                            });
                            tableHtml += `</tbody>`;
                        }

                        return `
                            <div class="bg-slate-800/40 rounded-xl border border-slate-700/80 overflow-hidden shadow-lg mb-6">
                                <div class="bg-slate-900/80 px-5 py-4 border-b border-slate-700 flex flex-wrap justify-between items-center gap-3">
                                    <h3 class="font-bold text-lg text-white flex items-center gap-2"><i class="fa-solid fa-table-cells text-blue-500"></i> ${sec.title} <span class="bg-blue-900/50 text-blue-300 text-[10px] px-2 py-0.5 rounded-full uppercase ml-1">${sec.registrations.length}</span></h3>
                                    <div class="flex gap-2">
                                        <button onclick="App.ui.toggleTranspose('${sec.id}')" class="btn btn-secondary !py-1.5 !px-3 text-xs"><i class="fa-solid fa-retweet"></i> Lật bảng</button>
                                        <button onclick="App.ui.manageColumns('${sec.id}')" class="btn btn-secondary !py-1.5 !px-3 text-xs"><i class="fa-solid fa-columns"></i> Sửa Cột</button>
                                    </div>
                                </div>
                                <div class="overflow-x-auto relative">
                                    <table class="sheet-table">${tableHtml}</table>
                                </div>
                            </div>
                        `;
                    }).join('');
                },

                // Logic Lưu khi sửa trực tiếp trên bảng (Notion Style)
                async saveInlineCell(el, secId, regId, colId) {
                    const newVal = el.innerText.trim();
                    const sec = App.state.currentEventData.sections.find(s => s.id === secId);
                    const reg = sec.registrations.find(r => r.id === regId);
                    
                    if (reg.values[colId] !== newVal) {
                        reg.values[colId] = newVal;
                        
                        // Hiệu ứng nháy xanh lá báo hiệu lưu thành công
                        const oldBg = el.style.backgroundColor;
                        el.style.backgroundColor = 'rgba(16, 185, 129, 0.2)'; 
                        
                        await App.db.saveEventState(); // Lưu âm thầm vào Firebase
                        setTimeout(() => el.style.backgroundColor = oldBg, 300);

                        // Nếu cột đang sửa khớp với cột đang phân tích ở Biểu đồ, cập nhật biểu đồ
                        if (document.getElementById('chartColSelect').value === colId) {
                            App.chart.update();
                        }
                    }
                },

                async deleteRow(secId, regId) {
                    const sec = App.state.currentEventData.sections.find(s => s.id === secId);
                    sec.registrations = sec.registrations.filter(r => r.id !== regId);
                    await App.db.saveEventState();
                    App.chart.update(); // Refresh Biểu đồ

                async toggleTranspose(secId) {
                    const sec = App.state.currentEventData.sections.find(s => s.id === secId);
                    sec.isTransposed = !sec.isTransposed;
                    await App.db.saveEventState();

                renderForm() {
                    const data = App.state.currentEventData;
                    if(!data || !data.sections) return;

                    const secSelect = document.getElementById('formSectionSelect');
                    const oldVal = secSelect.value;
                    secSelect.innerHTML = data.sections.map(s => `<option value="${s.id}">📝 Điền vào: ${s.title}</option>`).join('');
                    if(oldVal && data.sections.find(s=>s.id===oldVal)) secSelect.value = oldVal;
                    
                    App.state.activeSectionId = secSelect.value;
                    const sec = data.sections.find(s => s.id === App.state.activeSectionId);

                    document.getElementById('regForm').innerHTML = sec.columns.map(col => `
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider">${col.label}</label>
                            ${col.label.toLowerCase().includes('ghi chú') || col.label.toLowerCase().includes('nội dung')
                                ? `<textarea id="inp_${col.id}" rows="3" class="form-control resize-none" placeholder="Nhập ${col.label}..."></textarea>`
                                : `<input type="text" id="inp_${col.id}" class="form-control" placeholder="Nhập ${col.label}...">`
                            }
                        </div>
                    `).join('');
                },

                async saveForm() {
                    const sec = App.state.currentEventData.sections.find(s => s.id === App.state.activeSectionId);
                    const values = {};
                    let hasData = false;
                    
                    sec.columns.forEach(c => {
                        const val = document.getElementById(`inp_${c.id}`).value.trim();
                        values[c.id] = val;
                        if(val) hasData = true;
                    });

                    if(!hasData) return Toast.fire({ icon: 'warning', title: 'Bạn chưa nhập gì cả!' });

                    sec.registrations.push({ id: `reg_${Date.now()}`, values });
                    await App.db.saveEventState();
                    App.chart.update(); // Refresh Biểu đồ
                    
                    // Reset Form và Focus vào ô đầu tiên
                    sec.columns.forEach(c => document.getElementById(`inp_${c.id}`).value = '');
                    document.getElementById(`inp_${sec.columns[0].id}`)?.focus();
                    Toast.fire({ icon: 'success', title: 'Đã thêm dòng mới' });
                },

                // Quản lý Tab/Section (Kéo thả SweetAlert2)

                    App.ui._tmpUpdateSec = (id, val) => { tempSecs.find(x => x.id === id).title = val; };
                    App.ui._tmpDelSec = (id) => { if(tempSecs.length>1) { tempSecs = tempSecs.filter(x => x.id !== id); document.getElementById('swalStructDiv').innerHTML = renderHtml(); } else Swal.showValidationMessage('Phải giữ lại ít nhất 1 Bảng'); };
                    App.ui._tmpAddSec = () => { tempSecs.push({ id: `sec_${Date.now()}`, title: 'Bảng Mới', columns: App.config.defaultCols, registrations: [], isTransposed: false }); document.getElementById('swalStructDiv').innerHTML = renderHtml(); };

                    const res = await Swal.fire({

                        await App.db.saveEventState(true);

                // Quản lý Cột (Kéo thả SweetAlert2)
                async manageColumns(secId) {

                    let tempCols = JSON.parse(JSON.stringify(sec.columns));

                    const renderHtml = () => `<div id="swalSortCols" class="text-left space-y-2 max-h-64 overflow-y-auto pr-2">` +

                async renameEvent() {

                    if (name && name.trim()) {
                        App.state.currentEventData.name = name.trim();
                        await App.db.saveEventState(true);
                    }
                },

                shareEvent() {
                    navigator.clipboard.writeText(window.location.href);

                }
            },

            // 6. PHÂN TÍCH BIỂU ĐỒ (CHART.JS - TỰ ĐỘNG CẬP NHẬT)
            chart: {
                setup() {
                    const sec = App.state.currentEventData.sections[0];
                    if (!sec) return;
                    
                    const sel = document.getElementById('chartColSelect');
                    const oldVal = sel.value;
                    
                    // Loại trừ cột Tên và Ghi chú khỏi biểu đồ thống kê
                    const validCols = sec.columns.filter(c => !c.id.includes('name') && !c.id.includes('note'));
                    sel.innerHTML = validCols.length > 0 
                        ? validCols.map(c => `<option value="${c.id}">${c.label}</option>`).join('')
                        : sec.columns.map(c => `<option value="${c.id}">${c.label}</option>`).join('');

                    if (oldVal && sec.columns.some(c => c.id === oldVal)) sel.value = oldVal;
                    this.update();
                },

                update() {
                    const sec = App.state.currentEventData.sections[0];
                    const colId = document.getElementById('chartColSelect').value;
                    const ctx = document.getElementById('analyticsChart').getContext('2d');
                    
                    if (App.state.chartInstance) App.state.chartInstance.destroy();

                    if (!sec || !colId || sec.registrations.length === 0) {
                        ctx.canvas.style.display = 'none'; return;
                    }
                    ctx.canvas.style.display = 'block';

                    const counts = {};
                    sec.registrations.forEach(r => {
                        const val = r.values[colId]?.trim() || 'Chưa phân loại';
                        counts[val] = (counts[val] || 0) + 1;
                    });

                    Chart.defaults.color = '#94a3b8';
                    App.state.chartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(counts),
                            datasets: [{ data: Object.values(counts), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#64748b'], borderWidth: 0 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, boxWidth: 12 } } }, cutout: '65%' }
                    });
                }
            },

            // 7. TRÍ TUỆ NHÂN TẠO GEMINI (Bảo mật Key & Kháng Regex Lỗi)
            ai: {
                async configKey() {
                    const { value: key } = await Swal.fire({
                        title: '<i class="fa-solid fa-key text-amber-400"></i> Cấu hình Gemini API',
                        html: `<p class="text-sm text-slate-400 text-left mb-4">Nhập API Key để kích hoạt AI. Mã được mã hóa và lưu an toàn hoàn toàn trên trình duyệt của bạn (Local Storage).</p>
                               <input type="password" id="swalGeminiKey" class="form-control" value="${localStorage.getItem('gemini_api_key') || ''}" placeholder="Nhập API Key bắt đầu bằng AIzaSy...">
                               <div class="text-left mt-2"><a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-blue-400 hover:underline">Nhận API Key Google miễn phí tại đây</a></div>`,
                        background: '#1e293b', color: '#fff', showCancelButton: true, confirmButtonText: 'Lưu Hệ thống',
                        preConfirm: () => document.getElementById('swalGeminiKey').value.trim()
                    });

                    if (key !== undefined) {
                        localStorage.setItem('gemini_api_key', key);
                        Toast.fire({ icon: 'success', title: 'Đã cập nhật AI Key' });
                    }
                },

                async openAssistant() {
                    const key = localStorage.getItem('gemini_api_key');
                    if (!key) return this.configKey();

                    const secOpts = App.state.currentEventData.sections.map(s => `<option value="${s.id}">${s.title}</option>`).join('');

                    const { value: form } = await Swal.fire({
                        title: '✨ AI Copilot',
                        html: `
                            <div class="text-left space-y-4">
                                <div>
                                    <label class="text-sm font-semibold text-slate-300 block mb-1">Chủ đề / Yêu cầu của bạn:</label>
                                    <textarea id="aiPrompt" class="form-control h-20" placeholder="VD: Liệt kê 5 loại thiết bị sự kiện cần có..."></textarea>
                                </div>
                                <div>
                                    <label class="text-sm font-semibold text-slate-300 block mb-1">Kiểu hiển thị kết quả:</label>
                                    <select id="aiMode" class="form-control">
                                        <option value="text">Văn bản (Đọc & Copy)</option>
                                        <option value="table">Tự động sinh dữ liệu đổ thẳng vào Bảng</option>
                                    </select>
                                </div>
                                <div id="aiTargetBox" class="hidden">
                                    <label class="text-sm font-semibold text-emerald-400 block mb-1">Chọn bảng để AI chèn dữ liệu:</label>
                                    <select id="aiTarget" class="form-control bg-emerald-900/20 border-emerald-500/50">${secOpts}</select>
                                </div>
                            </div>
                        `,
                        background: '#1e293b', color: '#fff', showCancelButton: true, confirmButtonText: '<i class="fa-solid fa-paper-plane"></i> Phân tích ngay',
                        didOpen: () => {
                            document.getElementById('aiMode').onchange = (e) => {
                                document.getElementById('aiTargetBox').style.display = e.target.value === 'table' ? 'block' : 'none';
                            };
                        },
                        preConfirm: () => ({ prompt: document.getElementById('aiPrompt').value, mode: document.getElementById('aiMode').value, target: document.getElementById('aiTarget').value })
                    });

                    if (form && form.prompt) this.processAI(form, key);
                },

                async processAI(form, key) {
                    Swal.fire({ title: 'AI đang suy nghĩ...', html: 'Quá trình này mất khoảng 5-10 giây.', allowOutsideClick: false, background: '#1e293b', color: '#fff', didOpen: () => Swal.showLoading() });

                    const sec = form.mode === 'table' ? App.state.currentEventData.sections.find(s => s.id === form.target) : null;
                    let sysPrompt = `Bạn là chuyên gia tổ chức sự kiện. Chủ đề/Yêu cầu: "${form.prompt}". `;
                    
                    if (form.mode === 'table') {
                        const cols = sec.columns.map(c => `"${c.id}": "[Nội dung của ${c.label}]"`).join(', ');
                        sysPrompt += `Hãy sinh ra 5 dòng dữ liệu giả định để thêm vào bảng. YÊU CẦU TUYỆT ĐỐI: Trả về DUY NHẤT một mảng JSON hợp lệ chứa các Object. Cấu trúc mỗi Object phải CHÍNH XÁC như sau: {${cols}}. Không giải thích gì thêm, KHÔNG bọc trong thẻ markdown.`;
                    } else {
                        sysPrompt += `Trình bày bằng tiếng Việt, sử dụng định dạng Markdown đẹp mắt (tiêu đề, in đậm, danh sách dấu chấm).`;
                    }

                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: sysPrompt }] }] })
                        });
                        
                        if (!res.ok) throw new Error("API Key không hợp lệ hoặc máy chủ Google đang bận.");
                        const data = await res.json();
                        const textResult = data.candidates[0].content.parts[0].text;

                        if (form.mode === 'table') {
                            // CÔNG NGHỆ KHÁNG LỖI AI: Dùng Regex ép bóc tách lấy mảng JSON, loại bỏ rác văn bản/markdown AI hay tự sinh thêm
                            let jsonStr = textResult;
                            const mdMatch = textResult.match(/```(?:json)?\n?([\s\S]*?)```/);
                            if (mdMatch) {
                                jsonStr = mdMatch[1];
                            } else {
                                const arrMatch = textResult.match(/\[[\s\S]*\]/);
                                if (arrMatch) jsonStr = arrMatch[0];
                            }
                            
                            const arr = JSON.parse(jsonStr.trim());
                            arr.forEach(item => sec.registrations.push({ id: `reg_ai_${Date.now()}_${Math.random()}`, values: item }));
                            await App.db.saveEventState();
                            App.chart.update(); // Refresh Biểu đồ
                            
                            Swal.fire({ icon: 'success', title: 'Hoàn hảo!', text: `Đã tự động đổ ${arr.length} dòng dữ liệu vào bảng "${sec.title}".`, background: '#1e293b', color: '#fff' });
                        } else {
                            // Dùng marked.js để render Markdown sang HTML
                            Swal.fire({
                                title: 'Kết quả từ AI', width: '800px', background: '#1e293b', color: '#fff',
                                html: `<div class="text-left prose prose-invert prose-sm max-w-none bg-slate-900 border border-slate-700 p-6 rounded-xl overflow-y-auto max-h-[60vh]">${marked.parse(textResult)}</div>`,
                                confirmButtonText: '<i class="fa-solid fa-copy"></i> Copy Văn bản'
                            }).then(r => { if(r.isConfirmed) { navigator.clipboard.writeText(textResult); Toast.fire({icon: 'success', title: 'Đã lưu vào bộ nhớ tạm'}); } });
                        }
                    } catch (error) {
                        Swal.fire('Lỗi AI', 'AI trả về định dạng không chuẩn hoặc bị nghẽn mạng. Hãy thử viết câu lệnh rõ ràng hơn.', 'error');
                    }
                }
            },

                            .col-stt { width: 50px; text-align: center; }

                            /* ================= FOOTER CHỮ KÝ ================= */
                            .signature-box { display: flex; justify-content: space-between; margin-top: 40px; page-break-inside: avoid; break-inside: avoid; text-align: center; font-size: 13pt; }
                            .sig-col { width: 45%; }
                            .sig-date { font-style: italic; margin-bottom: 5px; }
                            .sig-role { font-weight: bold; margin-bottom: 80px; text-transform: uppercase;}

                            /* ================= MEDIA QUERIES KHI GỌI LỆNH IN ================= */
                            @media print {
                                body { background: #fff; padding: 0; }
                                .document-container { margin: 0; padding: 0; box-shadow: none; max-width: 100%; border-radius: 0; }
                                @page { size: A4 portrait; margin: 15mm 15mm 20mm 15mm; }
                                .no-print { display: none !important; }
                                a[href]:after { content: none !important; } /* Xóa link URL thừa khi in */
                            }
                            
                            /* Nút Print hỗ trợ khi xem File HTML Độc lập */
                            .btn-print { display: block; width: fit-content; margin: 0 auto 30px; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; font-family: sans-serif; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; font-size: 16px; box-shadow: 0 4px 6px rgba(37,99,235,0.2);}
                        </style>
                    </head>
                    <body>
                        ${!isForPrint ? `<button onclick="window.print()" class="btn-print no-print">🖨️ Mở Máy In / Lưu PDF chuẩn A4 ngay</button>` : ''}
                        
                        <div class="document-container">
                            <div class="header-wrapper">
                                <div class="header-left">
                                    <p class="org-name">GIA ĐÌNH</p>
                                    <p class="org-name">MINH SƯ TỊNH QUANG</p>
                                    <div class="org-line"></div>
                                </div>
                                <div class="header-right">
                                    <p class="republic">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</p>
                                    <p class="independence">Độc lập - Tự do - Hạnh phúc</p>
                                    <div class="org-line"></div>
                                </div>
                            </div>

                            <div class="report-title-box">
                                <h1 class="report-title">BÁO CÁO TỔNG HỢP SỰ KIỆN</h1>
                                <div class="report-subtitle">Chủ đề / Tên sự kiện: ${data.name}</div>
                            </div>
                    `;

                    // Lặp Render từng Bảng (Sections)
                    data.sections.forEach((sec, index) => {
                        // ÉP TẤT CẢ VỀ BẢNG DỌC ĐỂ IN BÁO CÁO CHO CHUẨN MỰC
                        html += `<div class="section-title">${index + 1}. ${sec.title}</div>`;
                        html += `<table><thead><tr><th class="col-stt">STT</th>`;
                        sec.columns.forEach(c => { html += `<th>${c.label}</th>`; });
                        html += `</tr></thead><tbody>`;

                        if (sec.registrations.length === 0) {
                            html += `<tr><td colspan="${sec.columns.length + 1}" style="text-align: center; font-style: italic;">(Bảng chưa có dữ liệu)</td></tr>`;
                        } else {
                            sec.registrations.forEach((reg, i) => {
                                html += `<tr><td class="col-stt">${i + 1}</td>`;
                                sec.columns.forEach(c => {
                                    // Thay \n thành <br> để chữ không bị dính liền nhau
                                    const val = (reg.values[c.id] || '').replace(/\n/g, '<br>');
                                    html += `<td>${val}</td>`;
                                });
                                html += `</tr>`;
                            });
                        }
                        html += `</tbody></table>`;
                    });

                    html += `
                            <div class="signature-box">
                                <div class="sig-col">
                                    <div class="sig-role">Đại diện Ban Tổ Chức</div>
                                    <div style="font-size: 12pt; font-style: italic;">(Ký và ghi rõ họ tên)</div>
                                </div>
                                <div class="sig-col">
                                    <div class="sig-date">${dateStr}</div>
                                    <div class="sig-role">Người Lập Báo Cáo</div>
                                    <div style="font-size: 12pt; font-style: italic;">(Ký và ghi rõ họ tên)</div>
                                </div>
                            </div>
                        </div> </body>
                    </html>`;

                    return html;
                },

                // Lệnh Gọi Iframe Mở Trực Tiếp Hộp Thoại Máy In Của Hệ Điều Hành
                printReport() {
                    Toast.fire({ icon: 'info', title: 'Đang khởi tạo bản In chuẩn A4...' });
                    
                    const html = this.generateHTML(true);
                    
                    // Kỹ thuật Iframe tàng hình: In ngay mà không cần mở Tab trình duyệt mới
                    const iframe = document.createElement('iframe');
                    iframe.style.position = 'fixed';
                    iframe.style.right = '0';
                    iframe.style.bottom = '0';
                    iframe.style.width = '0';
                    iframe.style.height = '0';
                    iframe.style.border = 'none';
                    document.body.appendChild(iframe);

                    const doc = iframe.contentWindow.document;
                    doc.open(); doc.write(html); doc.close();

                    iframe.onload = function() {
                        iframe.contentWindow.focus();
                        iframe.contentWindow.print(); // Kích hoạt Dialog Print OS
                        
                        setTimeout(() => { if (document.body.contains(iframe)) document.body.removeChild(iframe); }, 3000);
                    };
                },

                // Lệnh Đóng gói toàn bộ cấu trúc giao diện HTML thành 1 File độc lập
                downloadHTML() {
                    const html = this.generateHTML(false);
                    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Bao_Cao_${App.state.currentEventData.name.replace(/\s+/g, '_')}.html`;
                    
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    Toast.fire({ icon: 'success', title: 'Đã tải File HTML đa dụng!' });
                },

                // Lệnh Xuất Excel bằng thư viện SheetJS
                toExcel() {
                    const wb = XLSX.utils.book_new();
                    App.state.currentEventData.sections.forEach((sec, idx) => {
                        const wsData = [ [sec.title.toUpperCase()], ['STT', ...sec.columns.map(c => c.label)] ];
                        sec.registrations.forEach((reg, i) => wsData.push([i + 1, ...sec.columns.map(c => reg.values[c.id] || '')]));
                        const ws = XLSX.utils.aoa_to_sheet(wsData);
                        
                        // Định dạng độ rộng cột (Cột STT nhỏ, cột chữ to)
                        const wscols = [{wch: 5}]; 
                        sec.columns.forEach(() => wscols.push({wch: 25}));
                        ws['!cols'] = wscols;

                        XLSX.utils.book_append_sheet(wb, ws, sec.title.substring(0, 30) || `Bang_${idx+1}`);
                    });
                    XLSX.writeFile(wb, `Du_Lieu_${App.state.currentEventData.name.replace(/\s+/g, '_')}.xlsx`);
                    Toast.fire({ icon: 'success', title: 'Đã xuất file Excel!' });
                }
            }
        };

        // Kích hoạt Hệ thống khi Code tải xong
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
