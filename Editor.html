<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMS Giao Lý - Enterprise Editor</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
    
    /* Custom Scrollbar cho mượt mà */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Khung giấy soạn thảo (Mô phỏng A4) */
    .editor-canvas {
      background: white;
      min-height: 297mm;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      border-radius: 4px;
      transition: outline 0.2s;
    }
    .editor-canvas:focus-within { outline: 2px solid #3b82f6; outline-offset: 2px; }
    
    #editableWrapper { outline: none; min-height: 100%; padding: 40px 48px; }

    /* Nút trên thanh Toolbar */
    .tb-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 6px; color: #475569;
      transition: all 0.2s; cursor: pointer;
    }
    .tb-btn:hover { background: #e2e8f0; color: #2563eb; }
    .tb-divider { width: 1px; height: 18px; background: #cbd5e1; margin: 0 4px; }

    /* Style Ghi chú (Comments) xịn xò */
    .gl-comment {
      background-color: #fef08a; /* Vàng nhạt */
      border-bottom: 2px dashed #eab308;
      cursor: pointer; padding: 0 4px; border-radius: 2px;
      transition: background 0.2s; font-weight: 500;
    }
    .gl-comment:hover { background-color: #fde047; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

  <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-20 shrink-0 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-md">
        <i class="fa-solid fa-book-bible text-xl"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold leading-tight">Giao Lý CMS <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full ml-1 align-middle uppercase tracking-wider">Pro</span></h1>
        <p class="text-xs text-slate-500 font-medium">Hệ thống đồng bộ GitHub & Firebase</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="autoSaveIndicator" class="text-xs text-emerald-600 font-medium mr-2 opacity-0 transition-opacity"><i class="fa-solid fa-check-circle"></i> Đã lưu nháp</span>
      <button onclick="App.showPreview()" class="px-4 py-2 text-sm font-semibold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition"><i class="fa-solid fa-eye mr-1"></i> Xem trước</button>
      <button onclick="App.saveToLocal(true)" class="px-4 py-2 text-sm font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-lg hover:bg-blue-100 transition"><i class="fa-solid fa-floppy-disk mr-1"></i> Lưu tạm</button>
      <button onclick="App.saveToGithub()" class="px-5 py-2 text-sm font-semibold text-white bg-slate-800 rounded-lg shadow hover:bg-slate-900 transition flex items-center gap-2"><i class="fa-brands fa-github text-lg"></i> Xuất bản</button>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col z-10 shrink-0">
      <div class="p-5 flex-1 overflow-y-auto space-y-6">
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">1. Quản lý tệp</label>
          <select id="fileSelect" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition bg-slate-50 mb-2">
            <option value="">Đang tải danh sách...</option>
          </select>
          <div class="flex gap-2">
            <button onclick="App.fetchFileList()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition"><i class="fa-solid fa-rotate-right"></i></button>
            <button onclick="App.loadFile()" class="flex-[3] bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-lg shadow-sm transition flex items-center justify-center gap-2"><i class="fa-solid fa-cloud-arrow-down"></i> Mở bài giảng</button>
          </div>
        </div>

        <hr class="border-slate-100">

        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">2. Công cụ chèn</label>
          <div class="space-y-2">
            <input type="file" id="imageInput" class="hidden" accept="image/*" />
            <button onclick="App.triggerImageUpload()" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium bg-white border border-slate-200 text-slate-700 rounded-lg hover:border-emerald-500 hover:text-emerald-600 transition shadow-sm hover:shadow">
              <div class="w-8 h-8 rounded bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0"><i class="fa-regular fa-image text-lg"></i></div> Chèn Ảnh (Firebase)
            </button>
            <button onclick="App.addComment()" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium bg-white border border-slate-200 text-slate-700 rounded-lg hover:border-amber-500 hover:text-amber-600 transition shadow-sm hover:shadow">
              <div class="w-8 h-8 rounded bg-amber-50 text-amber-500 flex items-center justify-center shrink-0"><i class="fa-regular fa-comment-dots text-lg"></i></div> Bôi đen & Ghi chú
            </button>
          </div>
        </div>
      </div>
    </aside>

    <section class="flex-1 flex flex-col relative bg-slate-100">
      
      <div id="editorToolbar" class="bg-white border-b border-slate-200 px-4 py-2 flex flex-wrap gap-1 items-center justify-center shadow-sm z-10 opacity-50 pointer-events-none transition-opacity">
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('bold')" title="In đậm"><i class="fa-solid fa-bold"></i></button>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('italic')" title="In nghiêng"><i class="fa-solid fa-italic"></i></button>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('underline')" title="Gạch chân"><i class="fa-solid fa-underline"></i></button>
        <div class="tb-divider"></div>
        <button class="tb-btn font-bold text-sm" onmousedown="event.preventDefault(); App.format('formatBlock', 'H2')" title="Heading 2">H2</button>
        <button class="tb-btn font-bold text-sm" onmousedown="event.preventDefault(); App.format('formatBlock', 'H3')" title="Heading 3">H3</button>
        <button class="tb-btn font-bold text-sm" onmousedown="event.preventDefault(); App.format('formatBlock', 'P')" title="Đoạn văn">P</button>
        <div class="tb-divider"></div>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('insertUnorderedList')" title="List chấm"><i class="fa-solid fa-list-ul"></i></button>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('insertOrderedList')" title="List số"><i class="fa-solid fa-list-ol"></i></button>
        <div class="tb-divider"></div>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('justifyLeft')" title="Căn trái"><i class="fa-solid fa-align-left"></i></button>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('justifyCenter')" title="Căn giữa"><i class="fa-solid fa-align-center"></i></button>
        <button class="tb-btn" onmousedown="event.preventDefault(); App.format('justifyRight')" title="Căn phải"><i class="fa-solid fa-align-right"></i></button>
        <div class="tb-divider"></div>
        <button class="tb-btn text-red-500 hover:text-red-600 hover:bg-red-50" onmousedown="event.preventDefault(); App.format('removeFormat')" title="Xóa định dạng"><i class="fa-solid fa-eraser"></i></button>
      </div>

      <div class="flex-1 overflow-y-auto p-8 flex justify-center relative">
        <div id="editorPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 select-none pointer-events-none">
          <i class="fa-regular fa-folder-open text-6xl mb-4 text-slate-300"></i>
          <p class="font-medium text-lg">Chưa có bài giảng nào được tải</p>
          <p class="text-sm mt-1">Vui lòng chọn tệp bên trái để bắt đầu</p>
        </div>
        
        <div id="canvasContainer" class="editor-canvas w-full max-w-4xl hidden">
          <div id="editableWrapper" class="text-slate-800 text-lg leading-relaxed"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="previewModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex-col justify-center items-center p-4">
    <div class="bg-white w-full max-w-6xl h-[95vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
      <div class="px-5 py-3 border-b bg-slate-50 flex justify-between items-center">
        <h3 class="font-bold text-slate-800"><i class="fa-solid fa-desktop text-blue-600 mr-2"></i> Trình xem trước</h3>
        <div class="flex items-center gap-3">
          <div class="bg-slate-200 p-1 rounded-lg flex gap-1">
            <button onclick="App.setPreviewDevice('desktop')" class="px-3 py-1.5 bg-white shadow-sm rounded-md text-slate-700 text-sm font-medium transition"><i class="fa-solid fa-desktop mr-1"></i> PC</button>
            <button onclick="App.setPreviewDevice('tablet')" class="px-3 py-1.5 hover:bg-white hover:shadow-sm rounded-md text-slate-600 text-sm font-medium transition"><i class="fa-solid fa-tablet-screen-button mr-1"></i> Tablet</button>
            <button onclick="App.setPreviewDevice('mobile')" class="px-3 py-1.5 hover:bg-white hover:shadow-sm rounded-md text-slate-600 text-sm font-medium transition"><i class="fa-solid fa-mobile-screen mr-1"></i> Mobile</button>
          </div>
          <button onclick="App.hidePreview()" class="w-8 h-8 rounded-full bg-slate-200 hover:bg-red-100 text-slate-600 hover:text-red-600 flex items-center justify-center transition ml-2"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
      </div>
      <div class="flex-1 bg-slate-300 flex justify-center items-center p-6 overflow-hidden">
        <iframe id="previewFrame" class="bg-white shadow-xl transition-all duration-300 rounded-lg border-0 w-full h-full"></iframe>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    const Toast = Swal.mixin({ toast: true, position: 'bottom-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });

    window.App = {
      // 1. CẤU HÌNH API
      config: {
        firebase: {
          apiKey: "AIzaSyAYDG6sVKYbLBzO_iQGwoK9FTH8deJVo3s",
          authDomain: "giaoly-editor.firebaseapp.com",
          projectId: "giaoly-editor",
          storageBucket: "giaoly-editor.appspot.com",
          messagingSenderId: "62184116846",
          appId: "1:62184116846:web:5bd50b4f8a433a066bcc7f"
        },
        functionUrl: 'https://us-central1-giaoly-editor.cloudfunctions.net/updateGitHubContent',
        baseUrl: 'https://thiensutinhquang.github.io/GiaoLy/'
      },
      
      state: {
        currentFile: null,
        savedCursorRange: null,
        htmlTemplate: { doctype: '', htmlOpen: '', headContent: '', bodyOpen: '', scriptsInBody: '', fixedElements: [] }
      },

      dom: {
        fileSelect: document.getElementById('fileSelect'),
        wrapper: document.getElementById('editableWrapper'),
        canvas: document.getElementById('canvasContainer'),
        placeholder: document.getElementById('editorPlaceholder'),
        toolbar: document.getElementById('editorToolbar'),
        imageInput: document.getElementById('imageInput')
      },

      // 2. KHỞI TẠO HỆ THỐNG
      init() {
        this.firebaseApp = initializeApp(this.config.firebase);
        this.storage = getStorage(this.firebaseApp);
        
        this.fetchFileList();
        this.bindEvents();

        // Tự động lưu nháp mỗi 30 giây
        setInterval(() => this.saveToLocal(false), 30000);
      },

      // Lắng nghe sự kiện để lưu vị trí con trỏ & click vào Comment
      bindEvents() {
        const saveSelection = () => {
          const sel = window.getSelection();
          if (sel.rangeCount > 0) this.state.savedCursorRange = sel.getRangeAt(0);
        };
        ['keyup', 'mouseup', 'blur'].forEach(evt => this.dom.wrapper.addEventListener(evt, saveSelection));

        // Event Delegation siêu việt (Fix triệt để lỗi mất ghi chú)
        this.dom.wrapper.addEventListener('click', (e) => {
          const commentNode = e.target.closest('.gl-comment');
          if (commentNode) this.editComment(commentNode);
        });

        // Lắng nghe tải ảnh
        this.dom.imageInput.addEventListener('change', (e) => this.uploadImage(e));
      },

      restoreSelection() {
        if (this.state.savedCursorRange) {
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(this.state.savedCursorRange);
        }
      },

      format(cmd, value = null) {
        if (!this.dom.wrapper.isContentEditable) return;
        document.execCommand(cmd, false, value);
        this.dom.wrapper.focus();
      },

      // 3. XỬ LÝ FILE GITHUB
      async fetchFileList() {
        this.dom.fileSelect.innerHTML = '<option value="">⏳ Đang lấy danh sách...</option>';
        this.dom.fileSelect.disabled = true;
        try {
          const res = await fetch(this.config.functionUrl, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'list_files' })
          });
          const data = await res.json();
          if (!data.success) throw new Error(data.error);
          
          this.dom.fileSelect.innerHTML = '<option value="">-- Chọn tệp HTML --</option>';
          data.files.forEach(f => this.dom.fileSelect.appendChild(new Option(f, f)));
          Toast.fire({ icon: 'success', title: 'Đã tải xong danh sách' });
        } catch (err) {
          Swal.fire('Lỗi kết nối', err.message, 'error');
          this.dom.fileSelect.innerHTML = '<option value="">❌ Lỗi máy chủ</option>';
        } finally {
          this.dom.fileSelect.disabled = false;
        }
      },

      async loadFile() {
        const file = this.dom.fileSelect.value;
        if (!file) return Swal.fire('Lưu ý', 'Vui lòng chọn một tệp để bắt đầu.', 'warning');

        Swal.fire({ title: 'Đang phân tích cấu trúc HTML...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
          const res = await fetch(this.config.baseUrl + file + '?nocache=' + Date.now());
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();

          // Dùng DOMParser chống vỡ HTML
          const doc = new DOMParser().parseFromString(text, 'text/html');
          
          this.state.currentFile = file;
          this.state.htmlTemplate.doctype = doc.doctype ? `<!DOCTYPE ${doc.doctype.name}>` : '<!DOCTYPE html>';
          this.state.htmlTemplate.htmlOpen = doc.documentElement.outerHTML.match(/<html[^>]*>/i)?.[0] || '<html>';
          this.state.htmlTemplate.bodyOpen = doc.body.outerHTML.match(/<body[^>]*>/i)?.[0] || '<body>';
          this.state.htmlTemplate.headContent = doc.head.innerHTML;
          this.state.htmlTemplate.fixedElements = [];
          this.state.htmlTemplate.scriptsInBody = '';

          let mainContent = '';
          Array.from(doc.body.children).forEach(child => {
            if (['HEADER', 'NAV', 'FOOTER'].includes(child.tagName)) {
              this.state.htmlTemplate.fixedElements.push(child.outerHTML);
            } else if (child.tagName === 'SCRIPT') {
              this.state.htmlTemplate.scriptsInBody += child.outerHTML + '\n';
            } else if (child.classList.contains('min-h-screen') || child.tagName === 'MAIN') {
              mainContent = child.innerHTML;
            } else if (!mainContent && child.textContent.trim()) {
              mainContent += child.outerHTML; // Dự phòng
            }
          });

          this.dom.placeholder.classList.add('hidden');
          this.dom.canvas.classList.remove('hidden');
          this.dom.toolbar.classList.remove('opacity-50', 'pointer-events-none');
          this.dom.wrapper.contentEditable = "true";
          
          // Fallback Ảnh hỏng
          this.dom.wrapper.innerHTML = mainContent || text;
          this.dom.wrapper.querySelectorAll('img').forEach(img => {
            img.onerror = function() { this.src = 'https://placehold.co/600x400/fee2e2/ef4444?text=Loi+Hinh+Anh'; this.onerror=null; };
          });

          Swal.close();

          // Hỏi khôi phục nháp (Lưu riêng lẻ theo tên tệp)
          const draft = localStorage.getItem(`draft_${file}`);
          if (draft) {
            const confirm = await Swal.fire({
              title: 'Phát hiện bản nháp', text: 'Bạn có muốn khôi phục bản nháp đang soạn dở của bài này?',
              icon: 'question', showCancelButton: true, confirmButtonText: 'Khôi phục', cancelButtonText: 'Xóa nháp'
            });
            if (confirm.isConfirmed) this.dom.wrapper.innerHTML = draft;
            else localStorage.removeItem(`draft_${file}`);
          }

        } catch (err) {
          Swal.fire('Lỗi tải tệp', err.message, 'error');
        }
      },

      // 4. LƯU & XUẤT BẢN
      saveToLocal(showToast = false) {
        if (!this.state.currentFile || !this.dom.wrapper.isContentEditable) return;
        localStorage.setItem(`draft_${this.state.currentFile}`, this.dom.wrapper.innerHTML);
        
        const indicator = document.getElementById('autoSaveIndicator');
        indicator.classList.remove('opacity-0');
        setTimeout(() => indicator.classList.add('opacity-0'), 2500);

        if (showToast) Toast.fire({ icon: 'success', title: 'Đã lưu nháp vào máy tính' });
      },

      async saveToGithub() {
        if (!this.state.currentFile || !this.dom.wrapper.isContentEditable) return Swal.fire('Lưu ý', 'Chưa có gì để lưu!', 'warning');

        const { value: commitMsg } = await Swal.fire({
          title: 'Xuất bản (Push to Github)', input: 'text',
          inputLabel: 'Tóm tắt sự thay đổi:', inputValue: `Cập nhật ${this.state.currentFile}`,
          showCancelButton: true, confirmButtonText: 'Đẩy lên Website'
        });
        if (!commitMsg) return;

        Swal.fire({ title: 'Đang đẩy lên máy chủ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const htmlRaw = this.dom.wrapper.innerHTML.replace(/`/g, '\\`');
        const tpl = this.state.htmlTemplate;
        const fullContent = `
${tpl.doctype}
${tpl.htmlOpen}
<head>${tpl.headContent}</head>
${tpl.bodyOpen}
    ${tpl.fixedElements.join('\n')}
    <div class="min-h-screen p-4 md:p-8">
        ${htmlRaw}
    </div>
    ${tpl.scriptsInBody}
</body>
</html>`.trim();

        try {
          const res = await fetch(this.config.functionUrl, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'update_file', filePath: this.state.currentFile, newContent: fullContent, commitMessage: commitMsg })
          });
          const result = await res.json();
          if (result.success) {
            localStorage.removeItem(`draft_${this.state.currentFile}`);
            Swal.fire('Thành công', 'Hệ thống đã nhận dữ liệu. Website sẽ cập nhật tự động sau vài phút.', 'success');
          } else throw new Error(result.error);
        } catch (err) {
          Swal.fire('Lỗi xuất bản', err.message, 'error');
        }
      },

      // 5. GHI CHÚ CHUYÊN NGHIỆP (Data-attribute x Event Delegation)
      async addComment() {
        if (!this.dom.wrapper.isContentEditable) return Swal.fire('Lưu ý', 'Hãy mở tệp trước!', 'info');
        this.restoreSelection(); // Gọi lại con trỏ

        const sel = window.getSelection();
        if (!sel.rangeCount || sel.isCollapsed) return Swal.fire('Lưu ý', 'Hãy bôi đen một đoạn chữ để gắn ghi chú.', 'info');

        const { value: noteText } = await Swal.fire({
          title: 'Gắn Ghi Chú', input: 'textarea', inputPlaceholder: 'Nhập nội dung giải nghĩa...', showCancelButton: true, confirmButtonText: 'Lưu'
        });

        if (noteText) {
          const range = sel.getRangeAt(0);
          const span = document.createElement('span');
          span.className = 'gl-comment';
          span.setAttribute('data-note', noteText); // Lưu bằng data siêu an toàn
          span.title = noteText;
          span.textContent = range.toString();
          
          range.deleteContents();
          range.insertNode(span);
          this.format('insertHTML', ''); // Xóa highlight
          Toast.fire({ icon: 'success', title: 'Đã gắn ghi chú' });
        }
      },

      async editComment(span) {
        const currentNote = span.getAttribute('data-note');
        const result = await Swal.fire({
          title: 'Ghi chú', text: currentNote, icon: 'info',
          showDenyButton: true, showCancelButton: true,
          confirmButtonText: 'Sửa nội dung', denyButtonText: 'Gỡ bỏ ghi chú', cancelButtonText: 'Đóng'
        });

        if (result.isConfirmed) {
          const { value: newNote } = await Swal.fire({ title: 'Sửa ghi chú', input: 'textarea', inputValue: currentNote });
          if (newNote) {
            span.setAttribute('data-note', newNote);
            span.title = newNote;
            Toast.fire({ icon: 'success', title: 'Cập nhật hoàn tất' });
          }
        } else if (result.isDenied) {
          // Unwrap: Xóa thẻ span nhưng giữ lại Text bên trong
          const textNode = document.createTextNode(span.textContent);
          span.parentNode.replaceChild(textNode, span);
          Toast.fire({ icon: 'info', title: 'Đã gỡ ghi chú' });
        }
      },

      // 6. UPLOAD ẢNH FIREBASE TẠI VỊ TRÍ CON TRỎ (Có Load %)
      triggerImageUpload() {
        if (!this.dom.wrapper.isContentEditable) return Swal.fire('Lưu ý', 'Hãy mở bài giảng trước!', 'warning');
        this.restoreSelection();
        this.dom.imageInput.click();
      },

      async uploadImage(e) {
        const file = e.target.files[0];
        if (!file) return;

        const storageRef = ref(this.storage, 'images/giaoly_' + Date.now() + '_' + file.name.replace(/\s+/g, '-'));
        const uploadTask = uploadBytesResumable(storageRef, file);

        Swal.fire({ title: 'Đang đẩy ảnh lên Cloud...', html: 'Tiến trình: <b>0%</b>', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        uploadTask.on('state_changed', 
          (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            const b = Swal.getHtmlContainer().querySelector('b');
            if (b) b.textContent = Math.round(progress) + '%';
          },
          (error) => Swal.fire('Lỗi', error.message, 'error'),
          async () => {
            const url = await getDownloadURL(uploadTask.snapshot.ref);
            this.restoreSelection(); // Về đúng chỗ đang đứng
            
            const imgHTML = `<img src="${url}" class="max-w-full h-auto rounded-xl shadow border border-slate-200 my-6 mx-auto block" alt="Hình ảnh" />&nbsp;`;
            this.format('insertHTML', imgHTML);
            
            Swal.close();
            Toast.fire({ icon: 'success', title: 'Chèn ảnh thành công' });
            e.target.value = '';
          }
        );
      },

      // 7. XEM TRƯỚC BÀI GIẢNG (PREVIEW)
      showPreview() {
        if (!this.dom.wrapper.isContentEditable) return;
        const tpl = this.state.htmlTemplate;
        
        // Nhúng một CSS ẩn tạm cái nền vàng của ghi chú để xem đúng giao diện thật
        const previewHTML = `
${tpl.doctype}
${tpl.htmlOpen}
<head>
    ${tpl.headContent}
    <style>.gl-comment { background: transparent !important; border: none !important; font-weight: inherit !important; pointer-events: none; }</style>
</head>
${tpl.bodyOpen}
    ${tpl.fixedElements.join('\n')}
    <div class="min-h-screen p-4 md:p-8">${this.dom.wrapper.innerHTML}</div>
</body>
</html>`;
        
        document.getElementById('previewFrame').srcdoc = previewHTML;
        document.getElementById('previewModal').classList.replace('hidden', 'flex');
        this.setPreviewDevice('desktop');
      },

      hidePreview() { document.getElementById('previewModal').classList.replace('flex', 'hidden'); },

      setPreviewDevice(type) {
        const frame = document.getElementById('previewFrame');
        frame.style.width = type === 'mobile' ? '375px' : (type === 'tablet' ? '768px' : '100%');
        frame.style.height = type === 'desktop' ? '100%' : '90%';
      }
    };

    // Chạy khi Web tải xong
    document.addEventListener('DOMContentLoaded', () => App.init());

  </script>
</body>
</html>
